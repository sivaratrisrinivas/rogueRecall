<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>RogueRecall — operator workflow prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#app">Skip to dashboard</a>
    <!-- Three variants of the local operator workflow, switchable via ?variant=, on a throwaway prototype route. -->
    <main id="app"></main>
    <nav class="prototype-switcher" aria-label="Prototype variant switcher">
      <button id="previous-variant" type="button" aria-label="Previous variant">←</button>
      <div>
        <small>Prototype view</small>
        <strong id="variant-label" aria-live="polite"></strong>
      </div>
      <button id="next-variant" type="button" aria-label="Next variant">→</button>
    </nav>
    <script src="./app.js"></script>
  </body>
</html>
